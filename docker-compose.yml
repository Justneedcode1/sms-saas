version: '3.8'

services:
  backend:
    build: ./
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sms_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
