<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS SaaS Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .auth-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .auth-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #3B82F6;
            font-size: 28px;
        }
        
        .auth-box h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        button:hover {
            background: #1E40AF;
        }
        
        .toggle-link {
            text-align: center;
            color: #6B7280;
        }
        
        .toggle-link a {
            color: #3B82F6;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        
        .toggle-link a:hover {
            text-decoration: underline;
        }
        
        .error {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #FECACA;
        }
        
        .success {
            background: #DCFCE7;
            color: #16A34A;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #BBF7D0;
        }
